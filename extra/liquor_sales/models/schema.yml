version: 2

# The following schema works with dbt-core > 1.10 and above
# Comment the line 'arguments:' to work on older versions of dbt (dbt-core < 1.10 and below)

models:
  - name: fact_sales
    description: "Fact table for item."
    columns:
      - name: invoice_and_item_number
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string
      - name: store_number
        description: "The foreign key to the store dimension table"
        tests:
          - relationships:
              arguments:
                to: ref('dim_store')
                field: store_number
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string
      - name: date
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: "PARSE_DATE('%F', '2012-01-01')"
                max_value: "CURRENT_DATE()"
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: date
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "sale_dollars = ROUND(CAST(bottles_sold AS NUMERIC) * CAST(state_bottle_retail AS NUMERIC), 2)"
            severity: error # accepts only `error` and `warn` default is error

dim_store:
  - name: dim_store
    columns:
      - name: store_number
        tests:
          - unique
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: string